[build]
  command = "npm run build:client"
  publish = "dist/spa"
  functions = "functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/test"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/hello"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/basic"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/basic"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/basic"
  status = 200