[build]
  command = "npm run build:client"
  publish = "dist/spa"
  functions = "functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["functions/**"]

# Enable functions for this site
[context.production]
  functions = "functions"

[context.deploy-preview]
  functions = "functions"

[[redirects]]
  from = "/test"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/hello"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/api/health.html"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/api/admin/users.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/basic"
  status = 200